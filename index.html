<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Highway Racer</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }
        body {
            background-color: #111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            color: white;
        }
        #game-container {
            position: relative;
            width: 360px;
            height: 540px;
            background: #222;
            border: 4px solid #ff0055;
            border-radius: 10px;
            box-shadow: 0 0 20px #ff0055;
            overflow: hidden;
        }
        canvas {
            display: block;
            background: #333;
        }
        .ui-element {
            position: absolute;
            font-weight: bold;
            font-size: 18px;
            text-shadow: 2px 2px #000;
        }
        #score-board { top: 15px; left: 15px; color: #00ffcc; }
        #high-score-board { top: 15px; right: 15px; color: #ffcc00; }
        
        #menu-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        h1 {
            color: #ff0055;
            font-size: 28px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #ff0055;
            text-align: center;
        }
        .btn {
            padding: 12px 30px;
            font-size: 18px;
            background: #00ffcc;
            color: #111;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 15px #00ffcc;
            transition: 0.2s;
        }
        .btn:active { transform: scale(0.95); }
        
        /* Mobile Controls */
        #controls {
            display: flex;
            width: 360px;
            justify-content: space-between;
            margin-top: 15px;
            padding: 0 10px;
        }
        .control-btn {
            width: 100px;
            height: 60px;
            background: #333;
            border: 2px solid #ff0055;
            border-radius: 10px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 10px rgba(255,0,85,0.3);
        }
        .control-btn:active { background: #ff0055; }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- UI Info -->
        <div id="score-board" class="ui-element">Score: <span id="score">0</span></div>
        <div id="high-score-board" class="ui-element">High: <span id="high-score">0</span></div>

        <!-- Menu/Game Over Screen -->
        <div id="menu-screen">
            <h1 id="menu-title">RETRO RACER</h1>
            <button class="btn" id="start-btn" onclick="startGame()">START GAME</button>
        </div>

        <!-- Game Board -->
        <canvas id="gameCanvas" width="360" height="540"></canvas>
    </div>

    <!-- Mobile Screen Buttons -->
    <div id="controls">
        <div class="control-btn" id="left-btn">◀</div>
        <div class="control-btn" id="right-btn">▶</div>
    </div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const highScoreEl = document.getElementById("high-score");
    const menuScreen = document.getElementById("menu-screen");
    const menuTitle = document.getElementById("menu-title");
    const startBtn = document.getElementById("start-btn");

    // Load High Score
    let highScore = localStorage.getItem("racer_high") || 0;
    highScoreEl.innerText = highScore;

    let gameInterval;
    let isGameRunning = false;
    let score = 0;
    let speed = 4;
    let roadOffset = 0;

    // Car settings
    const carWidth = 45;
    const carHeight = 75;
    let player = { x: 155, y: 440, speed: 6 };
    let enemies = [];
    let lanes = [45, 125, 205, 285]; // Car spawn paths

    // Controls tracking
    let moveLeft = false;
    let moveRight = false;

    // Keyboard Event listeners
    document.addEventListener("keydown", (e) => {
        if(e.key === "ArrowLeft") moveLeft = true;
        if(e.key === "ArrowRight") moveRight = true;
    });
    document.addEventListener("keyup", (e) => {
        if(e.key === "ArrowLeft") moveLeft = false;
        if(e.key === "ArrowRight") moveRight = false;
    });

    // Touch/Mobile Button Event Listeners
    const leftBtn = document.getElementById("left-btn");
    const rightBtn = document.getElementById("right-btn");

    leftBtn.addEventListener("touchstart", (e) => { e.preventDefault(); moveLeft = true; });
    leftBtn.addEventListener("touchend", () => moveLeft = false);
    rightBtn.addEventListener("touchstart", (e) => { e.preventDefault(); moveRight = true; });
    rightBtn.addEventListener("touchend", () => moveRight = false);

    // Also supports mouse clicks on buttons for testing
    leftBtn.addEventListener("mousedown", () => moveLeft = true);
    leftBtn.addEventListener("mouseup", () => moveLeft = false);
    rightBtn.addEventListener("mousedown", () => moveRight = true);
    rightBtn.addEventListener("mouseup", () => moveRight = false);

    function startGame() {
        menuScreen.style.display = "none";
        score = 0;
        speed = 4;
        player.x = 155;
        enemies = [];
        isGameRunning = true;
        scoreEl.innerText = score;
        
        clearInterval(gameInterval);
        gameInterval = setInterval(updateGame, 1000 / 60); // 60 FPS Loop
    }

    function spawnEnemy() {
        if (Math.random() < 0.02 && enemies.length < 3) {
            let lane = lanes[Math.floor(Math.random() * lanes.length)];
            
            // Check if lane is already blocked closely
            let isLaneBlocked = enemies.some(enemy => enemy.lane === lane && enemy.y < 150);
            
            if(!isLaneBlocked) {
                let colors = ["#00ffcc", "#ffcc00", "#9900ff", "#00ff00"];
                let randomColor = colors[Math.floor(Math.random() * colors.length)];
                enemies.push({ x: lane, y: -80, lane: lane, color: randomColor });
            }
        }
    }

    function drawRoad() {
        // Draw Highway lines
        ctx.fillStyle = "#333";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = "#fff";
        // Left & Right boundary lines
        ctx.fillRect(20, 0, 5, canvas.height);
        ctx.fillRect(335, 0, 5, canvas.height);

        // Moving lane dividers
        ctx.fillStyle = "#aaaaaa";
        roadOffset += speed;
        if (roadOffset > 40) roadOffset = 0;

        for (let y = roadOffset - 40; y < canvas.height; y += 40) {
            ctx.fillRect(105, y, 4, 20);
            ctx.fillRect(185, y, 4, 20);
            ctx.fillRect(265, y, 4, 20);
        }
    }

    function drawCar(x, y, color, isPlayer = false) {
        ctx.fillStyle = color;
        // Main Body
        ctx.fillRect(x, y, carWidth, carHeight);
        
        // Wheels
        ctx.fillStyle = "#000";
        ctx.fillRect(x - 4, y + 10, 4, 15);
        ctx.fillRect(x + carWidth, y + 10, 4, 15);
        ctx.fillRect(x - 4, y + 50, 4, 15);
        ctx.fillRect(x + carWidth, y + 50, 4, 15);

        // Windshield / Glass
        ctx.fillStyle = isPlayer ? "#00ffff" : "#ffffff";
        ctx.fillRect(x + 5, y + 20, carWidth - 10, 15);
    }

    function checkCollision(rect1, rect2) {
        return rect1.x < rect2.x + carWidth &&
               rect1.x + carWidth > rect2.x &&
               rect1.y < rect2.y + carHeight &&
               rect1.y + carHeight > rect2.y;
    }

    function gameOver() {
        isGameRunning = false;
        clearInterval(gameInterval);
        
        if (score > highScore) {
            highScore = score;
            localStorage.setItem("racer_high", highScore);
            highScoreEl.innerText = highScore;
        }

        menuTitle.innerHTML = "GAME OVER<br><span style='font-size:18px; color:white;'>Your Score: " + score + "</span>";
        startBtn.innerText = "PLAY AGAIN";
        menuScreen.style.display = "flex";
    }

    function updateGame() {
        if (!isGameRunning) return;

        // 1. Move Player
        if (moveLeft && player.x > 25) player.x -= player.speed;
        if (moveRight && player.x < 335 - carWidth) player.x += player.speed;

        // 2. Clear & Draw Road
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawRoad();

        // 3. Draw Player
        drawCar(player.x, player.y, "#ff0055", true);

        // 4. Enemy Logistics
        spawnEnemy();
        
        for (let i = enemies.length - 1; i >= 0; i--) {
            enemies[i].y += speed; // Move down
            drawCar(enemies[i].x, enemies[i].y, enemies[i].color, false);

            // Check collision with player
            if (checkCollision(player, enemies[i])) {
                gameOver();
                return;
            }

            // Remove if off-screen and add score
            if (enemies[i].y > canvas.height) {
                enemies.splice(i, 1);
                score += 100;
                scoreEl.innerText = score;
                
                // Increase difficulty speed slowly
                if (score % 500 === 0) speed += 0.5;
            }
        }
    }
</script>
</body>
</html>
